<mat-card class="apps-to-do-list-card table-style-two mb-25 border-radius d-block bg-white border-0 shadow-none"
    [class.component-rtl-enabled]="themeService.isRTLEnabled()">
    <div class="mt-3">
        @if(!showCmsForm){
        <app-mat-table #mattablechild URL="CMS/All" [action]="action" [filterOptions]="['All']"
            [columns]="columns" (add)="Toggleclass($event,'add')" (view)="Toggleclass($event,'view')"
            (edit)="Toggleclass($event,'edit')" [addedName]="'CMS'"></app-mat-table>
        }@else{
        <form [formGroup]="cmsForm">
            <div class="row">
                 <h4 style="margin-bottom: 15px;">{{ formMode === 'add' ? 'Add' : formMode === 'edit' ? 'Edit' : 'View' }} CMS</h4>
                <mat-form-field [hidden]="true">
                    <input matInput placeholder="" formControlName="Id" type="text" />
                </mat-form-field>

                <div class="col-md-12">
                    <div class="form-group">
                        <mat-form-field  [appearance]="formFieldAppearance" class="w-100">
                            <mat-label> Title</mat-label>
                            <input matInput placeholder="" formControlName="Title" type="text" />
                        </mat-form-field>
                    </div>
                </div>

                <div class="col-md-12 mt-3">
                    <div class="form-group">
                        <!-- <app-quill></app-quill> -->
                        <app-quill [description]="cmsForm.get('Description')?.value" [Mode]="formMode" (descriptionChange)="updateDescription($event)"></app-quill>
                    </div>
                </div>

                <div class="col-md-12 mt-3">
                   <app-fileupload [filedname]="'CMS'" 
                   [previewUrls]="cmsurls"
                    (ImageEmitValue)="onImageReceived($event)" 
                    (deleteImage)="onDeleteImage($event)"
                     [Mode]="formMode"
                    ></app-fileupload>
               </div>

                 <div class="col-md-12 mt-3">
                    <div class="buttonsset">
                   <button type="button" class="btn mt-1 cacelbutton" style="width: 100px;" (click)="closeCMSForm()">
                Cancel
              </button>
              <button type="button" class="btn mt-1 submitbutton"  style="width: 100px;" (click)="SubmitCMSForm(cmsForm)">
                Submit
              </button>
                    </div>

                 </div>

            </div>
        </form>
        }
    </div>
</mat-card>
