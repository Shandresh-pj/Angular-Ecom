<mat-card class="apps-to-do-list-card table-style-two mb-25 border-radius d-block bg-white border-0 shadow-none"
    [class.component-rtl-enabled]="themeService.isRTLEnabled()">
    <div class="mt-3">
        @if(!showfeedbackForm){
        <app-mat-table #mattablechild URL="FeedbackTestimonial/All" [action]="action" [filterOptions]="['All']"
            [columns]="columns" [customParams]="{Type: feedbackurl ? 'Feedback' : 'Testimonial'}" (add)="Toggleclass($event,'add')" (view)="Toggleclass($event,'view')"
            (edit)="Toggleclass($event,'edit')" [addedName]="feedbackurl ? 'Feedback' : 'Testimonial'" ></app-mat-table>
        }@else{
        <form [formGroup]="feedbackForm">
            <div class="row">
                 <h4 style="margin-bottom: 15px;">{{ formMode === 'add' ? 'Add' : formMode === 'edit' ? 'Edit' : 'View' }}  {{feedbackurl ? 'Feedback' : 'Testimonial'}}</h4>
                <mat-form-field [hidden]="true">
                    <input matInput placeholder="" formControlName="Id" type="text" />
                </mat-form-field>

                <div class="col-md-6  mt-3">
                    <div class="form-group">
                        <mat-form-field  [appearance]="formFieldAppearance" class="w-100">
                            <mat-label> Name</mat-label>
                            <input matInput placeholder="" formControlName="Name" type="text" />
                            @if (isFieldValid(feedbackForm, 'Name', 'required')) {
                                <mat-error>Name is required</mat-error>
                            }
                        </mat-form-field>
                    </div>
                </div>

                <div class="col-md-6 mt-3">
                    <div class="form-group">
                        <mat-form-field  [appearance]="formFieldAppearance" class="w-100">
                            <mat-label> Company</mat-label>
                            <input matInput placeholder="" formControlName="Company" type="text" />
                        </mat-form-field>
                    </div>
                </div>

                <div class="col-md-12 mt-3">
                    <div class="form-group">
                        <app-quill  [description]="feedbackForm.get('Description')?.value" [Mode]="formMode" (descriptionChange)="updateDescription($event)"></app-quill>
                    </div>
                </div>

                 <div class="col-md-12 mt-3">
                    <div class="buttonsset">
                   <button type="button" class="btn mt-1 cacelbutton" style="width: 100px;" (click)="closeFeedbackForm()">
                Cancel
              </button>
              @if (formMode !== "view") {
              <button type="button" class="btn mt-1 submitbutton"  style="width: 100px;" (click)="SubmitFeedbackForm(feedbackForm)">
                Submit
              </button>
            }
                    </div>

                 </div>

            </div>
        </form>
        }
    </div>
</mat-card>
