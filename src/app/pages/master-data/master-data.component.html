<mat-card class="apps-to-do-list-card table-style-two mb-25 border-radius d-block bg-white border-0 shadow-none"
    [class.component-rtl-enabled]="themeService.isRTLEnabled()">
    <div class="mt-3">
        @if(!showMasterDataForm){
        <app-mat-table #mattablechild URL="MasterData/All" [action]="action" [filterOptions]="['All']"
            [columns]="columns" (add)="Toggleclass($event,'add')" (view)="Toggleclass($event,'view')"
            (edit)="Toggleclass($event,'edit')" (delete)="onDelete($event)" [addedName]="'Master Data'"></app-mat-table>
        }@else{
        <form [formGroup]="masterdataForm">
            <div class="row">
                 <h4 style="margin-bottom: 15px;">{{ formMode === 'add' ? 'Add' : formMode === 'edit' ? 'Edit' : 'View' }} Master Data</h4>
                <mat-form-field [hidden]="true">
                    <input matInput placeholder="" formControlName="Id" type="text" />
                </mat-form-field>

                <!-- <div class="col-md-6">
                    <mat-form-field [appearance]="formFieldAppearance" class="w-100">
                      <mat-label>Master Type</mat-label>
                      <input matInput formControlName="MasterType" />
                    </mat-form-field>
                  </div> -->

                  <div class="col-md-6 mt-3">
                    <div class="form-group">
                        <mat-form-field [appearance]="formFieldAppearance">
                            <mat-label>Master Type</mat-label>
                               <mat-select formControlName="MasterType">
                                 <mat-option value='Views'>Views</mat-option>
                                 <mat-option value='Age'>Age</mat-option>
                                 <mat-option value='Install'>Install</mat-option>
                                  <!-- <mat-option value='Variant'>Variant</mat-option> -->
                      </mat-select>
                        </mat-form-field>
                    </div>
                </div>
                  
                  <div class="col-md-6 mt-3">
                    <mat-form-field [appearance]="formFieldAppearance" class="w-100">
                      <mat-label>Code</mat-label>
                      <input matInput formControlName="Code" />
                    </mat-form-field>
                  </div>
                  
                  <div class="col-md-6 mt-3">
                    <mat-form-field [appearance]="formFieldAppearance" class="w-100">
                      <mat-label>Value</mat-label>
                      <input matInput  formControlName="Value" />
                    </mat-form-field>
                  </div>
                  
                  <div class="col-md-6 mt-3">
                    <mat-form-field [appearance]="formFieldAppearance" class="w-100">
                      <mat-label>Position</mat-label>
                      <input matInput type="number" formControlName="Position" />
                    </mat-form-field>
                  </div>
                  
                  <div class="col-md-6 mt-3">
                    <mat-form-field [appearance]="formFieldAppearance" class="w-100">
                      <mat-label>Status</mat-label>
                      <mat-select formControlName="Status">
                        <mat-option value="Active">Active</mat-option>
                        <mat-option value="Inactive">Inactive</mat-option>
                      </mat-select>
                    </mat-form-field>
                  </div>

                 <div class="col-md-12 mt-3">
                    <div class="buttonsset">
                   <button type="button" class="btn mt-1 cacelbutton" style="width: 100px;" (click)="closeMasterDataForm()">
                Cancel
              </button>
              <button type="button" class="btn mt-1 submitbutton"  style="width: 100px;" (click)="SubmitMasterDataForm(masterdataForm)">
                Submit
              </button>
                    </div>

                 </div>

            </div>
        </form>
        }
    </div>
</mat-card>
