<mat-form-field class="example-full-width">
    <mat-chip-grid #chipList>
        @for (item of selectedItems ; track item) {
        <mat-chip-row [removable]="true" (removed)="removeItem(item)">
            {{ item.Name }}
            <button matChipRemove aria-label="'remove ' + keyword">
                <i class="material-symbols-outlined darkcolorclear"> cancel </i>
            </button>
        </mat-chip-row>
        }
        <input
        #chipInput
           class="darkcolorclear"
            placeholder="{{ placeholder }}"
            [formControl]="searchControl"
            [matAutocomplete]="auto"
            [matChipInputFor]="chipList"
            cdkDropListOrientation="horizontal"
            (matChipInputTokenEnd)="handleEnterKey()"
            (focus)="onInputFocus()" 
        />
    </mat-chip-grid>
    <mat-autocomplete
        #auto="matAutocomplete"
        (optionSelected)="selectItem($event)"
    >
        @for (option of filteredOptions ; track option) {
        <mat-option [value]="option">
            {{ option.Name }}
        </mat-option>
        }
    </mat-autocomplete>
</mat-form-field>
