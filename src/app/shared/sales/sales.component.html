<div class="row" [formGroup]="SalesForm">
  <h5>
     Sales Details
  </h5>

  <div class="col-md-3">
    <div class="form-group">
      <label class="main-label d-block fw-medium text-black">
        Sales Cycle
      </label>
      <mat-form-field>
        <mat-label> Sales Cycle </mat-label>
        <mat-select formControlName="SalesCycle">
          <mat-option value="immediate">Immediate </mat-option>
          <mat-option value="weekly">Weekly </mat-option>
          <mat-option value="fortnightly">Fortnightly</mat-option>
          <mat-option value="monthly">Monthly</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </div>

  <div class="col-md-3">
    <div class="form-group">
      <label class="main-label d-block fw-medium text-black">
        Sales Name
      </label>
      <mat-form-field>
        <mat-label> Sales Name </mat-label>

        <input matInput formControlName="SalesName" />
      </mat-form-field>
    </div>
  </div>

  <div class="col-md-3">
    <div class="form-group">
      <label class="main-label d-block fw-medium text-black">
        Sales Mobile
      </label>
      <mat-form-field>
        <mat-label>Sales Mobile </mat-label>

        <input matInput formControlName="SalesMobile" maxlength="10" (keypress)="numericOnly($event)"
          class="uppercase" />
      </mat-form-field>
    </div>
  </div>

  <div class="col-md-3">
    <div class="form-group">
      <label class="main-label d-block fw-medium text-black">
        Sales Email
      </label>
      <mat-form-field>
        <mat-label> Sales Email </mat-label>

        <mat-chip-grid #chipGrid aria-label="Sales Email selection" [disabled]="isUploadDisabled">
          @for(email of emails;track $index){
          <mat-chip-row (removed)="removeEmail(email)">
            {{ email }}
            <button matChipRemove>
              <mat-icon>cancel</mat-icon>
            </button>
          </mat-chip-row>
          }


          <input type="email" placeholder="Add email..." [matChipInputFor]="chipGrid"
            [matChipInputSeparatorKeyCodes]="separatorKeysCodes" (matChipInputTokenEnd)="addEmail($event)"
            (blur)="onBlur($event)" />
        </mat-chip-grid>
      </mat-form-field>
    </div>
  </div>


</div>
